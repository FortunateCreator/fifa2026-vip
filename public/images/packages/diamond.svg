<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A843" />
      <stop offset="50%" stop-color="#B8860B" />
      <stop offset="100%" stop-color="#8B6914" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0A" />
      <stop offset="50%" stop-color="#111" />
      <stop offset="100%" stop-color="#0A0A0A" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#222" />
      <stop offset="100%" stop-color="#111" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C0" />
      <stop offset="50%" stop-color="#A9A9A9" />
      <stop offset="100%" stop-color="#808080" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bgGrad)" rx="12"/>
  <rect x="4" y="4" width="592" height="392" fill="none" stroke="#B8860B" stroke-width="0.5" rx="10" opacity="0.3"/>
  <!-- Subtle radial glow -->
  <circle cx="300" cy="200" r="180" fill="#B8860B" opacity="0.04"/>

  <rect x="200" y="37" width="200" height="36" rx="18" fill="#B8860B" opacity="0.15"/>
  <text x="300" y="59" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="url(#goldGrad)" letter-spacing="3">FACETED PERFECTION</text>
  <g transform="translate(300,140) scale(1.0)" fill="none" stroke="url(#goldGrad)" stroke-width="2">
    <path d="M0,-40 L30,0 L0,40 L-30,0 Z" fill="url(#goldGrad)" opacity="0.15"/>
    <line x1="0" y1="-40" x2="20" y2="0" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-40" x2="-20" y2="0" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="0" x2="0" y2="40" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="0" x2="0" y2="40" stroke-width="1" opacity="0.4"/>
  </g>
  <line x1="220" y1="210" x2="380" y2="210" stroke="#B8860B" stroke-width="0.5" opacity="0.4"/>
  <text x="300" y="255" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="30" fill="#FFFFFF" font-weight="700" letter-spacing="2">Diamond Suite</text>
  <text x="300" y="290" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#D4A843" letter-spacing="4" opacity="0.8">Diamond suite with private butler, champagne bar, and VIP parking.</text>
  <line x1="220" y1="320" x2="380" y2="320" stroke="#B8860B" stroke-width="0.5" opacity="0.4"/>
  <text x="300" y="350" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="url(#goldGrad)" letter-spacing="2" font-weight="700">$50,000</text>
  <rect x="0" y="396" width="600" height="4" fill="url(#goldGrad)" rx="2"/>
  <text x="585" y="385" text-anchor="end" font-family="Georgia,serif" font-size="11" fill="#B8860B" opacity="0.15" letter-spacing="2">VANTAGE 26</text>
</svg>