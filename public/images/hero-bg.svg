<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" width="1440" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="40%" stop-color="#0A0A0A" />
      <stop offset="100%" stop-color="#111" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A843" />
      <stop offset="50%" stop-color="#B8860B" />
      <stop offset="100%" stop-color="#8B6914" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#B8860B" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#B8860B" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1440" height="800" fill="url(#bgGrad)"/>
  <rect width="1440" height="800" fill="url(#glowGrad)"/>
  <!-- Stadium silhouette -->
  <g fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.12" transform="translate(720,420)">
    <path d="M-300,200 L-300,-60 Q-300,-120 0,-180 Q300,-120 300,-60 L300,200" stroke-width="2"/>
    <line x1="-300" y1="200" x2="300" y2="200" stroke-width="3"/>
    <line x1="-240" y1="-40" x2="-240" y2="100" opacity="0.3"/>
    <line x1="-160" y1="-60" x2="-160" y2="100" opacity="0.3"/>
    <line x1="-80" y1="-100" x2="-80" y2="100" opacity="0.3"/>
    <line x1="0" y1="-120" x2="0" y2="100" opacity="0.3"/>
    <line x1="80" y1="-100" x2="80" y2="100" opacity="0.3"/>
    <line x1="160" y1="-60" x2="160" y2="100" opacity="0.3"/>
    <line x1="240" y1="-40" x2="240" y2="100" opacity="0.3"/>
    <!-- field -->
    <rect x="-100" y="30" width="200" height="90" rx="2" opacity="0.08" stroke-width="1"/>
    <line x1="0" y1="30" x2="0" y2="120" opacity="0.08"/>
    <circle cx="0" cy="75" r="25" opacity="0.08" stroke-width="1"/>
  </g>
  <!-- Gold line art decoration -->
  <g stroke="#B8860B" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="780" x2="1440" y2="780"/>
    <line x1="0" y1="783" x2="1440" y2="783"/>
  </g>
  <!-- Corner ornaments -->
  <rect x="30" y="30" width="60" height="2" fill="#B8860B" opacity="0.15"/>
  <rect x="30" y="30" width="2" height="60" fill="#B8860B" opacity="0.15"/>
  <rect x="1350" y="30" width="60" height="2" fill="#B8860B" opacity="0.15"/>
  <rect x="1438" y="30" width="2" height="60" fill="#B8860B" opacity="0.15"/>
  <rect x="30" y="768" width="60" height="2" fill="#B8860B" opacity="0.15"/>
  <rect x="30" y="738" width="2" height="60" fill="#B8860B" opacity="0.15"/>
  <rect x="1350" y="768" width="60" height="2" fill="#B8860B" opacity="0.15"/>
  <rect x="1438" y="738" width="2" height="60" fill="#B8860B" opacity="0.15"/>
